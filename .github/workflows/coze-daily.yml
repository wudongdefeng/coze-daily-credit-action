name: Coze daily credit

on:
  schedule:
    - cron: "30 21 * * *"
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run Coze daily action
        env:
          COZE_STORAGE_STATE_JSON: ${{ secrets.COZE_STORAGE_STATE_JSON }}
          COZE_COOKIES_JSON: ${{ secrets.COZE_COOKIES_JSON }}
          COZE_TARGET_URL: ${{ vars.COZE_TARGET_URL }}
          COZE_CLICK_TEXTS: ${{ vars.COZE_CLICK_TEXTS }}
          PLAYWRIGHT_TIMEOUT_MS: "30000"
          POST_LOAD_WAIT_MS: "5000"
        run: npm start

      - name: Update Coze cookie secret
        if: success()
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          COZE_SECRET_NAME: COZE_COOKIES_JSON
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: npm run update-secret

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: coze-failure
          path: artifacts/
          if-no-files-found: ignore

      - name: Notify Bark on failure
        if: failure()
        env:
          BARK_PUSH_URL: ${{ secrets.BARK_PUSH_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPOSITORY: ${{ github.repository }}
        run: |
          node - <<'NODE'
          const base = (process.env.BARK_PUSH_URL || "").replace(/\/+$/, "");
          if (!base) {
            console.log("BARK_PUSH_URL is not set; skip notification.");
            process.exit(0);
          }

          const title = encodeURIComponent("Coze每日积分失败");
          const body = encodeURIComponent([
            "GitHub Actions 运行失败。",
            `Repo: ${process.env.REPOSITORY}`,
            `Run: ${process.env.RUN_URL}`
          ].join("\n"));

          const response = await fetch(`${base}/${title}/${body}`);
          if (!response.ok) {
            throw new Error(`Bark returned HTTP ${response.status}: ${await response.text()}`);
          }
          console.log("Bark notification sent.");
          NODE

      - name: Upload updated storage state
        if: ${{ success() && vars.UPLOAD_UPDATED_STORAGE_STATE == 'true' }}
        uses: actions/upload-artifact@v6
        with:
          name: coze-storage-state
          path: artifacts/storage_state.updated.json
          if-no-files-found: ignore
          retention-days: 3
